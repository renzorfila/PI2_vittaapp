spring.application.name=vittaapp
# ── Conexão com o MySQL ──────────────────────────────────────────
# Troque "root" e "sua_senha" pelos seus dados
# "vittaapp" é o nome do banco que você vai criar
spring.datasource.url=jdbc:mysql://localhost:3306/vittaapp?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────────────
# "update" cria/atualiza as tabelas automaticamente ao iniciar
# Troque por "create" se quiser recriar tudo do zero (apaga os dados!)
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL executado no terminal (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
